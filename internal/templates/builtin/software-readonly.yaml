description: Read-only software work — safe daily debugging and analysis.
safety_level: read-only
auth_mode: subscription
tools:
  - codex
  - claude
secret_keys:
  - GITHUB_TOKEN
mcp:
  github:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${secret:GITHUB_TOKEN}"
    read_only: true
  filesystem:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "."
    read_only: true
